<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChallengeLabs — Learn by Doing</title>
    <meta name="description" content="ChallengeLabs is a challenge-based learning platform where you complete guided technical challenges inside isolated lab environments." />
    <!-- Apply saved theme immediately to prevent flash of wrong theme -->
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        document.documentElement.dataset.theme = (t === 'light') ? 'light' : 'dark';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
