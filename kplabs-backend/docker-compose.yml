version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kplabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kplabs
      POSTGRES_PASSWORD: kplabs_dev_password
      POSTGRES_DB: kplabs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kplabs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kplabs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
